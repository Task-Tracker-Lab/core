services:
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command:
      - -config.file=/etc/tempo/tempo.yaml
      - -config.expand-env=true
    configs:
      - source: tempo
        target: /etc/tempo/tempo.yaml
    environment:
      TEMPO_PORT: ${TEMPO_PORT}
      TEMPO_OTLP_GRPC_PORT: ${TEMPO_OTLP_GRPC_PORT}
      TEMPO_OTLP_HTTP_PORT: ${TEMPO_OTLP_HTTP_PORT}
    volumes:
      - tempo:/var/tempo
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 768M
        reservations:
          cpus: "0.1"
          memory: 256M

configs:
  tempo-config:
    file: ./configs/tempo.yaml

volumes:
  tempo:

networks:
  monitoring:
    external: true
