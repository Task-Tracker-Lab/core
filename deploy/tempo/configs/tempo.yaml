stream_over_http_enabled: true

server:
  http_listen_port: ${TEMPO_PORT}

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: '0.0.0.0:${TEMPO_OTLP_GRPC_PORT}'
        http:
          endpoint: '0.0.0.0:${TEMPO_OTLP_HTTP_PORT}'

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
