services:
  database-exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${DB_USERNAME}:${DB_PASSWORD}@database:5432/${DB_DATABASE}?sslmode=disable
    networks:
      - monitoring
    deploy:
      replicas: 1
      placement:
        constraints: [ node.role == manager ]
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

networks:
  monitoring:
    external: true
