services:
  backend:
    image: ghcr.io/task-tracker-lab/backend:dev
    networks:
      - gateway
      - monitoring
      - proxy
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DOMAIN=${DOMAIN}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_SCHEMA=${DB_SCHEMA}
      - DATABASE_URL=postgres://${DB_USERNAME}:${DB_PASSWORD}@database_database:5432/${DB_DATABASE}?schema=${DB_SCHEMA}

      - REDIS_HOST=redis_redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}

      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
      - MAIL_FROM_EMAIL=${MAIL_FROM_EMAIL}

      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}

      - IMAGOR_SECRET=${IMAGOR_SECRET}
      - IMAGOR_URL=${IMAGOR_URL}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider
            http://127.0.0.1:$PORT/v1/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M
      placement:
        constraints:
          - node.role == manager

networks:
  gateway:
    external: true
  proxy:
    external: true
  monitoring:
    external: true
