services:
  storage:
    image: rustfs/rustfs:latest
    security_opt:
      - "no-new-privileges:true"
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_ACCESS_KEY=${STORAGE_ROOT_USER}
      - RUSTFS_SECRET_KEY=${STORAGE_ROOT_PASSWORD}
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_VOLUMES=/storage
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
    networks:
      - proxy
      - gateway
      - monitoring
    volumes:
      - storage:/storage
      - logs:/logs
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512mb
      restart_policy:
        condition: on-failure

  volume-permission-helper:
    image: alpine
    user: root
    volumes:
      - storage:/storage
      - logs:/logs
    deploy:
      restart_policy:
        condition: none
      placement:
        constraints:
          - node.role == manager
    command: >
      sh -c "
        chown -R 10001:10001 /storage /logs &&
        echo done
      "

  storage-init:
    image: minio/mc:latest
    depends_on:
      - storage
    volumes:
      - ./scripts/init.sh:/init.sh:ro
    networks:
      - gateway
    configs:
      - source: backend_policy
        target: /policies/backend.json
      - source: console_policy
        target: /policies/console.json
      - source: public_policy
        target: /policies/public.json
      - source: tmp_files_lifecycle
        target: /lifecycle/tmp.json
    environment:
      - DOMAIN=${DOMAIN}
      - STORAGE_ROOT_USER=${STORAGE_ROOT_USER}
      - STORAGE_ROOT_PASSWORD=${STORAGE_ROOT_PASSWORD}
      - BUCKET_NAME=${S3_BUCKET_NAME}
      - BACKEND_USER=${BACKEND_USER}
      - BACKEND_PASSWORD=${BACKEND_PASSWORD}
      - CONSOLE_USER=${CONSOLE_USER}
      - CONSOLE_PASSWORD=${CONSOLE_PASSWORD}
    entrypoint: /bin/sh
    command: /init.sh
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

configs:
  public_policy:
    file: ./policies/public.json
  backend_policy:
    file: ./policies/backend.json
  console_policy:
    file: ./policies/console.json
  tmp_files_lifecycle:
    file: ./lifecycle/tmp.json

volumes:
  storage:
  logs:

networks:
  gateway:
    external: true
  proxy:
    external: true
  monitoring:
    external: true
