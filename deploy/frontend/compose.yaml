services:
  frontend:
    image: ghcr.io/task-tracker-lab/frontend:dev
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_FARO_URL=${NEXT_PUBLIC_FARO_URL}
      - NEXT_PUBLIC_FARO_APP_NAME=${NEXT_PUBLIC_FARO_APP_NAME}
      - NEXT_PUBLIC_FARO_APP_NAMESPACE=${NEXT_PUBLIC_FARO_APP_NAMESPACE}
      - NEXT_PUBLIC_FARO_APP_VERSION=${NEXT_PUBLIC_FARO_APP_VERSION}
      - NEXT_PUBLIC_APP_ENV=${NEXT_PUBLIC_APP_ENV}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES}
      - GRAFANA_CLOUD_USERNAME=${GRAFANA_CLOUD_USERNAME}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      - GRAFANA_CLOUD_ENDPOINT=${GRAFANA_CLOUD_ENDPOINT}
      - PORT=${NEXT_PORT}
    networks:
      - monitoring
      - proxy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider
            http://127.0.0.1:$$PORT/api/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      placement:
        constraints:
          - node.role == manager

networks:
  proxy:
    external: true
  monitoring:
    external: true
