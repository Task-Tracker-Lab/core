services:
  prometheus:
    image: prom/prometheus:latest
    networks:
      - monitoring
    configs:
      - source: prom_conf
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      replicas: 1
      placement:
        constraints: [ node.role == manager ]
      resources:
        limits:
          cpus: "0.3"
          memory: 512M

configs:
  prom_conf:
    file: ./configs/prometheus.yml

volumes:
  prometheus:

networks:
  monitoring:
    external: true
