global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'nestjs-backend'
    metrics_path: '/v1/dump'
    static_configs:
      - targets: ['backend:1000']

  - job_name: 'node-exporter'
    dns_sd_configs:
      - names: ['tasks.node-exporter']
        type: 'A'
        port: 9100

  - job_name: 'cadvisor'
    dns_sd_configs:
      - names: ['tasks.cadvisor']
        type: 'A'
        port: 8080

  - job_name: 'database'
    static_configs:
      - targets: ['database-exporter:9187']