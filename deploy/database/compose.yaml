services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - ${APP_NET}
      - monitoring
    volumes:
      - ../../data/database/${ENV_NAME}:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-0.5}"
          memory: ${MEM_LIMIT:-512M}
      placement:
        constraints:
          - node.role == manager

networks:
  app_net:
    external: true
    name: ${APP_NET}
  monitoring:
    external: true
